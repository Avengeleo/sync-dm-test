[pytest]
# 工作区根加入 sys.path,让 common / 各套件包可被 import
pythonpath = .
# 收集所有服务套件的 tests
testpaths = bi_api_test dm_api_test im_test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v -ra --tb=short
markers =
    write: 会写库/改状态的用例(对测试环境有副作用)
    s3: 依赖测试环境 S3 可用
    tray_icon: 需配置 BI_TRAY_ICON_* 才运行
    bi: bi-admin 服务套件
    dm_api: dm-api 服务套件
    im: dm-im 长连接服务套件
    dm_im: dm-im 服务套件
